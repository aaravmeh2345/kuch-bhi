name: Priyansh Bot Run

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: |
          npm install --quiet
          # Agar koi specific library missing hai toh use yahan add karein

      - name: Run Priyansh Bot
        run: |
          node Priyansh.js || echo "Bot crashed or stopped."
        env:
          NODE_ENV: production
          
