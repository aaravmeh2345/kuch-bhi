name: Facebook Bot Run

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein auto-restart hoga
  workflow_dispatch: # Manual start karne ke liye button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # Aapki zaroorat ke hisaab se version change kar sakte hain

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        env:
          # Agar aapne Secrets use kiye hain toh yahan define karein
          APPSTATE: ${{ secrets.APPSTATE }} 
          
